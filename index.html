/* ─── parse helpers ─────────────────────────────────── */
function parseParts(){
  const m={};
  PARTS_RAW.split('\n').forEach(l=>{const[n,id]=l.split('\t');if(id)m[id]={id,name:n,category:n.split('_')[0]};});
  return m;
}
function parseBOM(){
  const m={};
  BOM_RAW.split('\n').forEach(l=>{
    const[prod,part,q]=l.split('\t');
    if(!prod||!part)return;
    if(!m[prod])m[prod]={};
    m[prod][part]=(m[prod][part]||0)+parseInt(q||1);
  });
  return m;
}
const PARTS=parseParts();
const BOM=parseBOM();

/* BOM enriched list */
const ALL_PARTS=Object.values(PARTS).map(p=>{
  let models=[],totalQty=0;
  Object.entries(BOM).forEach(([pid,parts])=>{
    if(parts[p.id]){models.push(pid);totalQty+=parts[p.id];}
  });
  return{...p,modelsCount:models.length,models:models.sort(),totalQty};
});

/* Stock data */
const outboundConsumption={};
Object.entries(OUT_BY_PROD).forEach(([prod,bikes])=>{
  Object.entries(BOM[prod]||{}).forEach(([part,qty])=>{
    outboundConsumption[part]=(outboundConsumption[part]||0)+bikes*qty;
  });
});
const DEFICITS={'C0068':-290,'C0069':-114,'C0070':-87,'C0084':-4,'C0085':-87,'C0086':-114,'C0124':-292,'C0125':-87,'C0126':-114};
const STOCK_DATA=ALL_PARTS.map(p=>{
  const ob=Math.round(outboundConsumption[p.id]||0);
  const deficit=DEFICITS[p.id]||0;
  return{...p,inbound:ob+deficit,outbound:ob,stock:deficit};
});

const ALL_CATS=[...new Set(ALL_PARTS.map(p=>p.category))].sort();

  const filtered=useMemo(()=>{
    let d=ALL_PARTS.filter(p=>{
      const q=search.toLowerCase();
      return(!q||p.name.toLowerCase().includes(q)||p.id.toLowerCase().includes(q))
        &&(selCat==="Alle"||p.category===selCat)
        &&p.modelsCount>=minModels;
    });
    return[...d].sort((a,b)=>{
      const va=a[sortBy],vb=b[sortBy];
      return typeof va==="string"?(sortDir==="asc"?va.localeCompare(vb):vb.localeCompare(va)):(sortDir==="asc"?va-vb:vb-va);
    });

      m[p.category].parts++;m[p.category].totalQty+=p.totalQty;
    });
    return Object.values(m).sort((a,b)=>b.totalQty-a.totalQty);

                })}
              </tbody>
            </table>
            {filtered.length===0&&<div style={{textAlign:"center",color:"#334155",padding:32}}>Keine Treffer</div>}
          </div>
        </>
      )}

      {subView==="chart"&&(
        <div style={{display:"flex",flexDirection:"column",gap:28}}>
          <div>
            <div style={{fontSize:11,color:"#475569",letterSpacing:1.5,marginBottom:12}}>GESAMT-BESTELLMENGE NACH KATEGORIE</div>
            <ResponsiveContainer width="100%" height={320}>
              <BarChart data={catChart} margin={{left:0,right:20,top:4,bottom:60}}>
                <XAxis dataKey="category" tick={{fill:"#475569",fontSize:10}} angle={-40} textAnchor="end" interval={0}/>
                <YAxis tick={{fill:"#475569",fontSize:10}} tickFormatter={v=>(v/1000).toFixed(0)+"k"}/>
                <Tooltip contentStyle={TOOLTIP_STYLE} formatter={(v,n)=>[v.toLocaleString('de-DE'),n==="totalQty"?"Gesamt-Qty":"Teile"]}/>
                <Bar dataKey="totalQty" radius={[3,3,0,0]}>{catChart.map(e=><Cell key={e.category} fill={cc(e.category)}/>)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div>
            <div style={{fontSize:11,color:"#475569",letterSpacing:1.5,marginBottom:12}}>TOP 10 TEILE NACH VERBAUVOLUMEN</div>
            <ResponsiveContainer width="100%" height={300}>
              <BarChart data={top10} layout="vertical" margin={{left:210,right:40,top:4,bottom:4}}>
                <XAxis type="number" tick={{fill:"#475569",fontSize:10}} tickFormatter={v=>(v/1000).toFixed(0)+"k"}/>
                <YAxis type="category" dataKey="name" tickFormatter={v=>v.replace(/_/g," ")} tick={{fill:"#94a3b8",fontSize:10}} width={210}/>
                <Tooltip contentStyle={TOOLTIP_STYLE} formatter={(v)=>[v.toLocaleString('de-DE'),"Qty"]}/>
                <Bar dataKey="totalQty" radius={[0,3,3,0]}>{top10.map(e=><Cell key={e.id} fill={cc(e.category)}/>)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div>
            <div style={{fontSize:11,color:"#475569",letterSpacing:1.5,marginBottom:10}}>LEGENDE</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{ALL_CATS.map(c=><T key={c} label={c} color={cc(c)}/>)}</div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   MODULE 2 — LAGERBESTAND
═══════════════════════════════════════════════════════════ */
function LagerModule(){
  const[search,setSearch]=useState("");
  const[selCat,setSelCat]=useState("Alle");
  const[filterSt,setFilterSt]=useState("Alle");
  const[sortBy,setSortBy]=useState("stock");
  const[sortDir,setSortDir]=useState("asc");
  const[subView,setSubView]=useState("table");
  const[hov,setHov]=useState(null);

  const filtered=useMemo(()=>{
    let d=STOCK_DATA.filter(p=>{
      const q=search.toLowerCase();
      return(!q||p.name.toLowerCase().includes(q)||p.id.toLowerCase().includes(q))
        &&(selCat==="Alle"||p.category===selCat)
        &&(filterSt==="Alle"||stockStatus(p).label===filterSt);
    });
    return[...d].sort((a,b)=>{
      const va=a[sortBy],vb=b[sortBy];
      return typeof va==="string"?(sortDir==="asc"?va.localeCompare(vb):vb.localeCompare(va)):(sortDir==="asc"?va-vb:vb-va);
    });
  },[search,selCat,filterSt,sortBy,sortDir]);

  const neg=useMemo(()=>STOCK_DATA.filter(p=>p.stock<0).sort((a,b)=>a.stock-b.stock),[]);

  const catChart=useMemo(()=>
    ALL_CATS.map(cat=>{
      const ps=STOCK_DATA.filter(p=>p.category===cat);
      return{category:cat,stock:ps.reduce((s,p)=>s+p.stock,0)};
    }).filter(c=>c.stock!==0).sort((a,b)=>a.stock-b.stock)
  ,[]);

  const toggleSort=col=>{if(sortBy===col)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortBy(col);setSortDir(col==="stock"?"asc":"desc");}};
  const stOpts=["Alle","NEGATIV","AUSGEGL.","OK"];
  const stColors={Alle:"#64748b","NEGATIV":"#ef4444","AUSGEGL.":"#3b82f6",OK:"#22c55e"};

  return(
    <div className="fade">
      {/* alert */}
      {neg.length>0&&(
        <div style={{background:"#1a0a0a",border:"1px solid #ef444430",borderRadius:8,padding:"10px 16px",marginBottom:16,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{color:"#ef4444",fontWeight:700,fontSize:11,letterSpacing:1.5,flexShrink:0}}>⚠ FEHLBESTÄNDE ({neg.length}):</span>
          {neg.map(p=>(
            <span key={p.id} style={{background:"#ef444418",border:"1px solid #ef444430",borderRadius:4,padding:"2px 10px",fontSize:11,color:"#fca5a1"}}>
              {p.name.replace(/_/g," ")} <strong style={{color:"#ef4444"}}>{fmt(p.stock)}</strong>
            </span>
          ))}
        </div>
      )}

      {/* sub-tabs */}
      <div style={{display:"flex",gap:0,borderBottom:"1px solid #1e293b",marginBottom:20}}>
        {[["table","TEILE-BESTAND"],["chart","ABWEICHUNGEN"],["products","PRODUKTVOLUMEN"]].map(([v,l])=>(
          <button key={v} onClick={()=>setSubView(v)} style={{padding:"9px 22px",background:"none",border:"none",cursor:"pointer",color:subView===v?"#f97316":"#475569",borderBottom:subView===v?"2px solid #f97316":"2px solid transparent",fontFamily:"inherit",fontSize:11,fontWeight:600,letterSpacing:1.5}}>{l}</button>
        ))}
      </div>

      {subView==="table"&&(
        <>
          <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
            <input placeholder="Teil suchen…" value={search} onChange={e=>setSearch(e.target.value)}
              style={{background:"#0f1e36",border:"1px solid #1e3a5f",color:"#e2e8f0",borderRadius:6,padding:"7px 12px",fontFamily:"inherit",fontSize:13,width:220,outline:"none"}}/>
            <select value={selCat} onChange={e=>setSelCat(e.target.value)}
              style={{background:"#0f1e36",border:"1px solid #1e3a5f",color:"#e2e8f0",borderRadius:6,padding:"7px 10px",fontFamily:"inherit",fontSize:13,outline:"none"}}>
              <option>Alle</option>{ALL_CATS.map(c=><option key={c}>{c}</option>)}
            </select>
            <div style={{display:"flex",gap:6}}>
              {stOpts.map(s=>(
                <button key={s} onClick={()=>setFilterSt(s)} style={{background:filterSt===s?stColors[s]:"#0f1e36",border:`1px solid ${filterSt===s?stColors[s]:"#1e3a5f"}`,color:filterSt===s?"#000":"#94a3b8",borderRadius:4,padding:"4px 10px",fontFamily:"inherit",fontSize:11,fontWeight:600,cursor:"pointer"}}>{s}</button>
              ))}
            </div>
            <span style={{marginLeft:"auto",fontSize:12,color:"#475569"}}>{filtered.length} Treffer</span>
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead>
                <tr style={{borderBottom:"1px solid #1e3a5f"}}>
                  <SortTh col="id" current={sortBy} dir={sortDir} onClick={toggleSort}>TEIL-ID</SortTh>
                  <SortTh col="name" current={sortBy} dir={sortDir} onClick={toggleSort}>BEZEICHNUNG</SortTh>
                  <SortTh col="category" current={sortBy} dir={sortDir} onClick={toggleSort}>KATEGORIE</SortTh>
                  <SortTh col="inbound" current={sortBy} dir={sortDir} onClick={toggleSort} right>INBOUND</SortTh>
                  <SortTh col="outbound" current={sortBy} dir={sortDir} onClick={toggleSort} right>VERBRAUCH</SortTh>
                  <SortTh col="stock" current={sortBy} dir={sortDir} onClick={toggleSort} right>LAGERBESTAND</SortTh>
                  <th style={{padding:"9px 10px",color:"#475569",fontWeight:600,fontSize:10,letterSpacing:1.2}}>STATUS</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(p=>{
                  const s=stockStatus(p),isH=hov===p.id;
                  return(
                    <tr key={p.id} onMouseEnter={()=>setHov(p.id)} onMouseLeave={()=>setHov(null)}
                      style={{borderBottom:"1px solid #0f1e36",background:isH?"#0f1e36":"transparent"}}>
                      <td style={{padding:"8px 10px",color:"#64748b",fontSize:11}}>{p.id}</td>
                      <td style={{padding:"8px 10px",color:"#e2e8f0",fontWeight:500,maxWidth:250,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name.replace(/_/g," ")}</td>
                      <td style={{padding:"8px 10px"}}><T label={p.category} color={cc(p.category)}/></td>
                      <td style={{padding:"8px 10px",textAlign:"right",color:"#60a5fa",fontWeight:600}}>{fmt(p.inbound)}</td>
                      <td style={{padding:"8px 10px",textAlign:"right",color:"#94a3b8"}}>{fmt(p.outbound)}</td>
                      <td style={{padding:"8px 14px 8px 10px",textAlign:"right"}}>
                        <span style={{color:s.color,fontWeight:700}}>{p.stock>0?"+":""}{fmt(p.stock)}</span>
                      </td>
                      <td style={{padding:"8px 10px"}}>
                        <span style={{background:s.bg,color:s.color,border:`1px solid ${s.color}44`,borderRadius:4,padding:"2px 8px",fontSize:10,fontWeight:700,letterSpacing:.8}}>{s.label}</span>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </>
      )}

      {subView==="chart"&&(
        <div style={{display:"flex",flexDirection:"column",gap:24}}>
          <div style={{background:"#0a1628",border:"1px solid #1e293b",borderRadius:8,padding:20}}>
            <div style={{fontSize:11,color:"#475569",letterSpacing:1.5,marginBottom:6}}>KATEGORIEN MIT LAGERABWEICHUNGEN</div>
            <div style={{fontSize:10,color:"#334155",marginBottom:16}}>163 von 172 Teilen ausgeglichen · 9 Fehlbestände (alle Road Bike Komponenten)</div>
            {catChart.length>0?(
              <ResponsiveContainer width="100%" height={260}>
                <BarChart data={catChart} margin={{left:20,right:20,top:4,bottom:10}}>
                  <XAxis dataKey="category" tick={{fill:"#475569",fontSize:11}}/>
                  <YAxis tick={{fill:"#475569",fontSize:10}}/>
                  <ReferenceLine y={0} stroke="#475569" strokeWidth={2}/>
                  <Tooltip contentStyle={TOOLTIP_STYLE} formatter={(v)=>[v.toLocaleString('de-DE'),"Lagerbestand"]}/>
                  <Bar dataKey="stock" radius={[3,3,0,0]}>{catChart.map(e=><Cell key={e.category} fill={e.stock<0?"#ef4444":cc(e.category)}/>)}</Bar>
                </BarChart>
              </ResponsiveContainer>
            ):<div style={{color:"#334155",padding:20,textAlign:"center"}}>Alle Kategorien ausgeglichen</div>}
          </div>
          <div style={{background:"#0a1628",border:"1px solid #ef444430",borderRadius:8,padding:20}}>
            <div style={{fontSize:11,color:"#ef4444",letterSpacing:1.5,marginBottom:16}}>🔴 DETAILANALYSE FEHLBESTÄNDE</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:10}}>
              {neg.map(p=>(
                <div key={p.id} style={{background:"#0f1e36",border:"1px solid #ef444430",borderRadius:6,padding:14}}>
                  <div style={{fontSize:12,color:"#e2e8f0",fontWeight:600,marginBottom:6}}>{p.name.replace(/_/g," ")}</div>
                  <div style={{display:"flex",gap:12,fontSize:11,marginBottom:8}}>
                    <span><span style={{color:"#60a5fa"}}>Eingang:</span> {fmt(p.inbound)}</span>
                    <span><span style={{color:"#f97316"}}>Verbrauch:</span> {fmt(p.outbound)}</span>
                  </div>
                  <div style={{width:"100%",height:4,background:"#1e293b",borderRadius:2,overflow:"hidden",marginBottom:6}}>
                    <div style={{width:`${Math.min((p.inbound/p.outbound)*100,100)}%`,height:"100%",background:"#ef4444",borderRadius:2}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <span style={{fontSize:10,color:"#475569"}}>{((p.inbound/p.outbound)*100).toFixed(1)}% gedeckt</span>
                    <span style={{fontSize:15,fontWeight:700,color:"#ef4444"}}>{fmt(p.stock)}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {subView==="products"&&(
        <div>
          <div style={{fontSize:11,color:"#475569",letterSpacing:1.5,marginBottom:14}}>AUSGELIEFERTE BIKES PRO MODELL — 2025 GESAMT: {fmt(TOTAL_BIKES)}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(185px,1fr))",gap:10}}>
            {Object.entries(OUT_BY_PROD).sort((a,b)=>b[1]-a[1]).map(([pid,qty])=>{
              const pct=(qty/TOTAL_BIKES)*100;
              return(
                <div key={pid} style={{background:"#0a1628",border:"1px solid #1e293b",borderRadius:8,padding:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <span style={{fontSize:12,fontWeight:700,color:"#f97316"}}>{pid}</span>
                    <span style={{fontSize:16,fontWeight:700,color:"#e2e8f0"}}>{fmt(qty)}</span>
                  </div>
                  <div style={{width:"100%",height:4,background:"#1e293b",borderRadius:2,overflow:"hidden"}}>
                    <div style={{width:`${pct}%`,height:"100%",background:"#f97316",borderRadius:2}}/>
                  </div>
                  <div style={{fontSize:10,color:"#475569",marginTop:6}}>{pct.toFixed(1)}% des Gesamtvolumens</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════ */
const MODULES=[
  {id:"bom",  label:"📋  BOM ANALYSE",   sub:"172 Teile · 21 Modelle"},
  {id:"lager",label:"📦  LAGERBESTAND",  sub:"Inbound vs. Verbrauch · 2025"},
];

function App(){
  const[module,setModule]=useState("bom");

  const bomStats=useMemo(()=>({
    total:ALL_PARTS.length,
    shared:ALL_PARTS.filter(p=>p.modelsCount>=3).length,
  }),[]);
  const lagerStats=useMemo(()=>({
    neg:STOCK_DATA.filter(p=>p.stock<0).length,
    ok:STOCK_DATA.filter(p=>p.stock>=0).length,
  }),[]);

  return(
    <div style={{minHeight:"100vh",background:"#020817",color:"#e2e8f0",fontFamily:"'IBM Plex Mono',monospace"}}>

      {/* ── TOP HEADER ── */}
      <div style={{background:"#040f20",borderBottom:"1px solid #0f2040",padding:"0 28px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,paddingTop:16,paddingBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:4,height:36,background:"linear-gradient(180deg,#f97316,#eab308)",borderRadius:2}}/>
            <div>
              <div style={{fontSize:16,fontWeight:700,letterSpacing:3,color:"#f1f5f9"}}>SUPPLY CHAIN DASHBOARD</div>
              <div style={{fontSize:9,color:"#334155",letterSpacing:2,marginTop:2}}>FAHRRAD-PRODUKTION · BOM & LAGER · 2025</div>
            </div>
          </div>
          <div style={{display:"flex",gap:24}}>
            <Stat label="TEILE GESAMT" value={bomStats.total} color="#60a5fa"/>
            <Stat label="IN 3+ MODELLEN" value={bomStats.shared} color="#f97316"/>
            <Stat label="BIKES VERSANDT" value={fmt(TOTAL_BIKES)} color="#94a3b8"/>
            <Stat label="FEHLBESTÄNDE" value={lagerStats.neg} color={lagerStats.neg>0?"#ef4444":"#22c55e"}/>
          </div>
        </div>

        {/* ── MODULE SWITCHER ── */}
        <div style={{display:"flex",gap:4,paddingBottom:0}}>
          {MODULES.map(m=>(
            <button key={m.id} onClick={()=>setModule(m.id)} style={{
              padding:"12px 28px",background:"none",border:"none",cursor:"pointer",
              color:module===m.id?"#f1f5f9":"#475569",
              borderBottom:module===m.id?"3px solid #f97316":"3px solid transparent",
              fontFamily:"inherit",fontSize:12,fontWeight:700,letterSpacing:1.5,
              transition:"all .15s",
              background:module===m.id?"#0a1628":"transparent",
              borderRadius:"6px 6px 0 0",
            }}>
              {m.label}
              <div style={{fontSize:9,color:module===m.id?"#475569":"#334155",fontWeight:400,marginTop:2,letterSpacing:1}}>{m.sub}</div>
            </button>
          ))}
        </div>
      </div>

      {/* ── CONTENT ── */}
      <div style={{padding:"24px 28px",maxWidth:1600}}>
        {module==="bom"&&<BomModule/>}
        {module==="lager"&&<LagerModule/>}
      </div>

      {/* FOOTER */}
      <div style={{padding:"0 28px 20px"}}>
        <div style={{borderTop:"1px solid #0f2040",paddingTop:10,fontSize:10,color:"#1e3a5f",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <span>Datenquelle: BOM-Liste (172 Teile, 21 Modelle) · Testdaten_Claude_Lagerfluss.xlsx (4.400 Lieferungen, 218.930 Bikes)</span>
          <span>Lagerbestand = Σ Inbound − (Bikes × BOM-Qty) · Exaktes P-Nummern-Mapping</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
